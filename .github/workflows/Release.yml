name: Release

# 触发器
on:
  push:
    tags:
      - v*
  pull_request:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      root_sol:
        description: "Release Title"
        required: true
        default: "SmsForwarder"
      release_tag:
        description: "Release Tag"
        required: true
        default: "test"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - uses: actions/checkout@v4
      # 设置jdk环境为11
      - name: set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
          java-package: jdk
      # 获取打包秘钥
      - name: Checkout Android Keystore
        uses: actions/checkout@v4
        with:
          repository: venssy/keystore
          token: ${{ secrets.TOKEN }} # 连接仓库的token,需要单独配置
          path: keystore # 仓库的根目录名
      # 打包release
      - name: Build with Gradle
        run: bash ./gradlew assembleRelease
  
      # 增加一个检查步骤，确认文件生成路径
      - name: Check APK Path
        run: find . -name "*.apk"

      # 直接使用 softprops 上传，整合创建与上传
      - name: Upload release binaries
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.release_tag || github.ref_name }}
          name: SmsForwarder-v${{ github.event.inputs.release_tag || github.ref_name }}
          # 修正路径：移除多余的 JSON 括号，确认路径是否包含 app 目录
          files: build/app/outputs/apk/release/SmsF_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
